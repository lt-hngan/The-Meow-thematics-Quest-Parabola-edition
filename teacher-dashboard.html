<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard - Offline Analytics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { color: #1a2a6c; margin: 0; text-transform: uppercase; text-shadow: 2px 2px 0px #ccc; }
        
        .stats-bar { text-align: center; background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; color: #333; font-weight: bold; border: 2px dashed #ccc; }
        
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1a2a6c; color: white; font-size: 14px; vertical-align: top; }
        tr:hover { background-color: #f1f1f1; }
        
        .sortable { cursor: pointer; user-select: none; }
        .sortable:hover { color: #FFD700; }
        .filter-select { width: 100%; margin-top: 8px; padding: 4px; font-size: 13px; border-radius: 4px; border: none; outline: none; color: #333; }
        
        .status-playing { color: #ff8a00; font-weight: bold; }
        .status-finished { color: #28a745; font-weight: bold; }
        .status-none { color: #dc3545; font-weight: bold; }
        /* Tăng độ rộng cột progress tại th ở table HTML bên dưới */
        .progress-badge { background: #007bff; color: white; padding: 6px 12px; border-radius: 12px; font-weight: bold; font-size: 15px; display: inline-block;}
        .delete-btn { background: none; border: none; cursor: pointer; font-size: 20px; transition: 0.2s; opacity: 0.7; }
        .delete-btn:hover { transform: scale(1.3); opacity: 1; }

        .ai-panel { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 6px solid #6f42c1; margin-bottom: 20px; }
        .ai-btn { background: #6f42c1; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-right: 10px; margin-bottom: 10px; }
        .ai-btn:hover { background: #5a32a3; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9000; }
        .modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 6px solid #6f42c1;}
        .modal-close { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; }
        
        .ai-output-content { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; line-height: 1.6; font-size: 15px; margin-top: 15px; }
        .ai-output-content h3 { color: #1a2a6c; margin-top: 0px; margin-bottom: 10px; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
        .ai-output-content ul { padding-left: 20px; }
        .ai-output-content li { margin-bottom: 15px; }
        .ai-output-content strong { color: #c82333; }
        
        #chart-container { width: 100%; height: 300px; margin-bottom: 20px; display: none; }
        
        .prompt-container { margin-top: 20px; background: #e9ecef; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; display: flex; flex-direction: column; gap: 10px; }
        .prompt-title { font-weight: bold; color: #1a2a6c; margin-bottom: 5px; }
        
        .btn-prompt-1 { background-color: #17a2b8; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-prompt-1:hover { background-color: #138496; }
        
        .btn-prompt-2 { background-color: #ffc107; color: #333; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-prompt-2:hover { background-color: #e0a800; }
        
        .btn-prompt-3 { background-color: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-prompt-3:hover { background-color: #218838; }
    </style>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header-container" style="justify-content: center; margin: 20px 0 30px 0;">
        <h1 id="ui-title">🎮 Student Result Dashboard 🎮</h1>
    </div>

    <div class="ai-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 id="ui-analytics-title" style="color: #6f42c1; margin: 0;">🧠 Pedagogical Analytics (Auto-Extract)</h2>
            <select id="app-language" onchange="changeLanguage()" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; cursor: pointer;">
                <option value="vi">🇻🇳 Tiếng Việt</option>
                <option value="en">🇬🇧 English</option>
            </select>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label id="ui-select-class-label" style="font-weight: bold; margin-right: 10px;">Select Class to Analyze:</label>
            <select id="ai-target-class" style="padding: 8px; border-radius: 5px;">
                <option value="ALL">All Classes</option>
                <option value="10A">Class 10A</option>
                <option value="10B">Class 10B</option>
            </select>
        </div>

        <div>
            <button class="ai-btn" id="btn-top-mistakes" onclick="generateReport('mistakes')">Common Mistakes Analysis</button>
            <button class="ai-btn" id="btn-top-time" onclick="generateReport('time')">Time Allocation Analysis</button>
            <button class="ai-btn" id="btn-top-attempts" onclick="generateReport('attempts')">Attempts Analysis</button>
        </div>
    </div>

    <div id="stats-container" class="stats-bar">Waiting for data...</div>
    
    <table id="dashboard-table">
        <thead>
            <tr>
                <th><span id="ui-col-class">Class</span><select id="filter-class" class="filter-select" onchange="renderTable()"><option value="">All</option><option value="10A">10A</option><option value="10B">10B</option></select></th>
                <th class="sortable" onclick="setSort('name')"><span id="ui-col-members">Group Members</span> ↕</th>
                <th><span id="ui-col-mode">Mode</span><select id="filter-mode" class="filter-select" onchange="renderTable()"><option value="">All</option><option value="practice">Practice</option><option value="combat">Combat</option></select></th>
                <th class="sortable" onclick="setSort('status')"><span id="ui-col-status">Status</span> ↕</th>
                <th class="sortable" style="width: 15%; min-width: 140px;" onclick="setSort('progress')"><span id="ui-col-progress">Progress</span> ↕</th>
                <th class="sortable" onclick="setSort('duration')"><span id="ui-col-duration">Duration</span> ↕</th>
                <th><span id="ui-col-wrong">Wrong Answers</span>
                    <select id="filter-wrong" class="filter-select" onchange="renderTable()">
                        <option value="">All</option><option value="Q1">Q1</option><option value="Q2">Q2</option><option value="Q3">Q3</option><option value="Q4">Q4</option><option value="Q5">Q5</option><option value="Q6">Q6</option><option value="Q7">Q7</option>
                    </select>
                </th>
                <th><span id="ui-col-topics">Review Topics</span>
                    <select id="filter-topic" class="filter-select" onchange="renderTable()">
                        <option value="">All Topics</option>
                    </select>
                </th>
                <th style="text-align: center;"><span id="ui-col-action">Action</span></th>
            </tr>
        </thead>
        <tbody id="student-list">
            <tr><td colspan="9" style="text-align: center;">Loading data from Firebase...</td></tr>
        </tbody>
    </table>

    <div id="ai-result-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('ai-result-modal')">X</button>
            <h2 id="ai-result-title" style="margin-top: 0; color: #6f42c1;">Analytics Result</h2>
            
            <div id="chart-container" style="position: relative; height: 250px;"><canvas id="analysisChart"></canvas></div>
            <div id="ai-output" class="ai-output-content"></div>
            
            <div class="prompt-container">
                <div class="prompt-title" id="ui-prompt-title">AI Prompt Options (Chép lệnh AI):</div>
                <button class="btn-prompt-1" id="btn-prompt-1" onclick="copyPrompt('deep_analysis')">Copy prompt AI for deep analysis</button>
                <button class="btn-prompt-2" id="btn-prompt-2" onclick="copyPrompt('activity')">Copy prompt AI for activity suggestions</button>
                <button class="btn-prompt-3" id="btn-prompt-3" onclick="copyPrompt('exam')">Copy prompt AI for exam recommendations</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // ------------------------------------------------------------------
        // CẬP NHẬT KỊCH BẢN VÀ BỔ SUNG TRƯỜNG "title" CHO TIẾNG VIỆT
        // ------------------------------------------------------------------
        const PEDAGOGY_DATA = {
            vi: {
                mistakes: {
                    "Concavity": { title: "Bề lõm của đồ thị", gap: 'Không xác định đúng hướng bề lõm (quay lên hay quay xuống) dựa vào hệ số $a$.', reason: 'Học sinh học vẹt quy tắc chữ ("a dương thì quay lên") nhưng thiếu liên kết hình ảnh trực quan (visual mapping) trong não bộ. Dẫn đến khi chịu áp lực thời gian, các em dễ bị nhầm lẫn phương hướng hoặc bị nhiễu bởi các hệ số $b, c$.', advice: 'Áp dụng phương pháp ghi nhớ hình ảnh "Mặt cười / Mặt mếu". Hệ số $a > 0$ (tích cực/vui vẻ) $\\rightarrow$ đồ thị là miệng cười (lõm lên). Hệ số $a < 0$ (tiêu cực/buồn bã) $\\rightarrow$ đồ thị là miệng mếu (lõm xuống). Cho học sinh thực hành vẽ biểu tượng mặt cười/mếu ngay bên cạnh hàm số đề bài.' },
                    "Formula for the x-coordinate of the vertex": { title: "Công thức hoành độ đỉnh", gap: 'Bỏ quên dấu âm ($-$) trong công thức $x = -\\frac{b}{2a}$.', reason: 'Sự quá tải nhận thức (cognitive overload) đối với các công thức có phân số. Học sinh cũng thường xuyên nhầm lẫn công thức này với định lý Vi-ét của phương trình bậc 2 ($x_1 + x_2 = -\\frac{b}{a}$).', advice: 'Biến công thức thành một "khẩu quyết" có nhịp điệu (ví dụ: "trừ bê trên hai a"). Yêu cầu học sinh tạo thói quen viết lại công thức gốc ra góc nháp trước khi bắt đầu thay số.' },
                    "Formula for the y-coordinate of the vertex": { title: "Công thức tung độ đỉnh", gap: 'Bỏ quên dấu âm ($-$) trong công thức $y = -\\frac{\\Delta}{4a}$.', reason: 'Biểu thức $\\Delta$ vốn đã phức tạp ($b^2 - 4ac$). Khi não bộ tập trung vào việc xử lý một thành phần khó, nó có xu hướng tự động "cắt bỏ" các chi tiết nhỏ lẻ (như dấu trừ phía trước) để giảm tải.', advice: 'Nhấn mạnh quy luật hình thức: "Tọa độ đỉnh $I$ của Parabol rất đồng bộ, cả x và y đều phải có dấu trừ ở phía trước phân số".' },
                    "Equation format of the axis of symmetry": { title: "Định dạng phương trình trục đối xứng", gap: 'Chọn phương trình đường thẳng nằm ngang ($y = ...$) thay vì đường thẳng đứng ($x = ...$).', reason: 'Mất gốc về khái niệm phương trình đường thẳng trên hệ trục tọa độ $Oxy$. Học sinh chỉ chăm chăm đi tính "con số" $-\\frac{b}{2a}$ mà quên mất bản chất hình học của trục đối xứng là một đường thẳng đứng song song với trục $Oy$.', advice: 'Trực quan hóa hình học: Vẽ một trục $Ox$, kẻ một đường thẳng đứng cắt ngang qua trục $Ox$. Nhấn mạnh với học sinh: "Đường thẳng này cắt trục $Ox$ tại một điểm, do đó tên của nó phải bắt đầu bằng x =".' },
                    "Calculating the axis of symmetry": { title: "Tính toán trục đối xứng", gap: 'Tính toán sai giá trị số của biểu thức $-\\frac{b}{2a}$.', reason: 'Kỹ năng xử lý số nguyên yếu, đặc biệt là lỗi "triệt tiêu dấu âm". Khi $b$ và $a$ đều là số âm, việc có tới 3 dấu trừ trong một phân số khiến các em bị rối.', advice: 'Dạy quy tắc "Đếm dấu trừ": Nếu phép tính có số lẻ dấu trừ (1 hoặc 3 dấu), kết quả chắc chắn mang dấu âm. Yêu cầu học sinh viết tường minh biểu thức thay số (VD: $-\\frac{-16}{2(-4)}$) trước khi bấm máy.' },
                    "Calculating the x-coordinate of the vertex": { title: "Tính toán hoành độ đỉnh", gap: 'Tính sai giá trị $x_I$.', reason: 'Giống với lỗi tính toán trục đối xứng (sai dấu khi thay số).', advice: 'Hướng dẫn sử dụng tính năng giải phương trình bậc hai trên máy tính cầm tay (Casio/Vinacal). Máy tính sẽ tự động cung cấp $x$-Value Minimum/Maximum ở cuối. Đây là công cụ đối chiếu kết quả tuyệt vời để học sinh tự sửa sai.' },
                    "Calculating the y-coordinate of the vertex": { title: "Tính toán tung độ đỉnh", gap: 'Thay $x_I$ vào hàm số ban đầu nhưng tính sai ra $y_I$.', reason: 'Lỗi cú pháp kinh điển: Không đóng ngoặc đơn khi bình phương một số âm (tính $-2 \\cdot -2^2$ thay vì tính $-2(-2)^2$).', advice: 'Cung cấp "cứu cánh" bằng máy tính: Nhập nguyên biểu thức hàm số chứa biến $x$ vào máy tính $\\rightarrow$ Bấm phím CALC $\\rightarrow$ Nhập giá trị $x$ vừa tìm được. Cách này triệt tiêu hoàn toàn lỗi thiếu ngoặc đơn của học sinh.' },
                    "Increasing/decreasing intervals": { title: "Khoảng đồng biến/nghịch biến", gap: 'Không liên kết được tọa độ đỉnh với sự phân chia khoảng trên trục số.', reason: 'Học sinh cố gắng suy luận bằng đại số hoặc học vẹt lý thuyết dài dòng, dẫn đến không biết ranh giới của các khoảng (điểm quay đầu) nằm ở đâu.', advice: 'Bắt buộc học sinh sử dụng "Bảng biến thiên" (Table of Variation) như một công cụ đồ họa trung gian. Khắc sâu: "Khoảng đồng/nghịch biến luôn nhìn ở dòng của $x$, không nhìn ở dòng của $y$".' },
                    "Identifying Maximum vs. Minimum based on concavity": { title: "Nhận diện Max/Min dựa vào bề lõm", gap: 'Chọn Min khi $a < 0$ hoặc ngược lại.', reason: 'Trực giác sai lầm: Các em thường nghĩ $a$ là số âm (tượng trưng cho sự nhỏ bé) thì hàm số sẽ có "Giá trị nhỏ nhất" (Min).', advice: 'Dùng hình ảnh so sánh thực tế: Hình $a < 0$ (mặt úp) giống như một "Ngọn núi" $\\rightarrow$ Núi thì phải có Đỉnh cao nhất (Max). Hình $a > 0$ (mặt ngửa) giống như một "Thung lũng" $\\rightarrow$ Thung lũng thì phải có Đáy thấp nhất (Min).' },
                    "Calculating the Maximum/Minimum value": { title: "Tính giá trị Max/Min", gap: 'Chọn đáp án là hoành độ $x$ thay vì tung độ $y$.', reason: 'Vội vàng. Giải quyết xong bước 1 (tìm $x$), học sinh thấy con số đó xuất hiện trong các đáp án (VD: Tính ra $x=2$, thấy đáp án ghi "Max=2") là vội vàng khoanh ngay mà quên mất khái niệm "Giá trị" của hàm số.', advice: 'Đưa ra quy ước đọc đề: Hễ thấy từ "Giá trị lớn nhất / Giá trị nhỏ nhất" trong đề bài, học sinh phải dùng bút gạch chân chữ "Giá trị" và ghi chữ $y = ?$ ngay bên cạnh để não bộ thiết lập mục tiêu tìm kiếm chính xác.' }
                },
                time: {
                    "Q1": { qContent: 'Xác định tính đúng/sai của phát biểu "Bề lõm quay xuống" cho hàm $y = -3x^2 + 5x - 2$.', gap: 'Phản xạ liên kết giữa dấu hệ số $a$ và hình dáng đồ thị.', reason: 'Học sinh thường phải dừng lại để nhớ lại quy ước (âm là lên hay xuống) thay vì có một phản xạ hình ảnh tức thời.', advice: 'Dạy học sinh mẹo "Mặt cười/Mặt mếu" ($a < 0$ là mặt mếu $\\rightarrow$ quay xuống). Yêu cầu học sinh ghi chú dấu của $a$ ngay lập tức khi đọc đề.' },
                    "Q2": { qContent: 'Chọn công thức tổng quát đúng cho tọa độ đỉnh $I$.', gap: 'Các đáp án gây nhiễu (distractors) có hình thức rất giống nhau về dấu và vị trí các đại số.', reason: 'Hiện tượng "loạn thị giác". Học sinh phải nhìn đi nhìn lại các phương án A, B, C, D để so sánh từng dấu cộng/trừ nhỏ xíu, dẫn đến việc đọc đi đọc lại nhiều lần.', advice: 'Yêu cầu học sinh tự viết công thức ra nháp trước khi nhìn vào các lựa chọn. Việc đối chiếu kết quả mình đã viết với đáp án sẽ nhanh hơn nhiều so với việc phân tích 4 đáp án gây nhiễu.' },
                    "Q3": { qContent: 'Tìm phương trình trục đối xứng của $y = -4x^2 - 16x + 3$.', gap: 'Phân biệt định dạng phương trình $x = ...$ và $y = ...$, đồng thời xử lý dấu khi tính toán.', reason: 'Học sinh tốn thời gian tính nhẩm $-\\frac{b}{2a}$ với nhiều dấu âm $(-16, -4)$ và phân vân giữa việc chọn $x$ hay $y$.', advice: 'Nhấn mạnh "Trục đối xứng là đường thẳng đứng, luôn bắt đầu bằng $x=$". Dạy học sinh cách đếm số dấu trừ: 3 dấu trừ trong biểu thức $-\\frac{-16}{2(-4)}$ chắc chắn kết quả phải âm.' },
                    "Q4": { qContent: 'Tìm tọa độ đỉnh của $y = -2x^2 - 8x - 10$.', gap: 'Kỹ năng thay số và tính toán giá trị của hàm số tại một điểm.', reason: 'Sai lầm trong tính toán thủ công (đặc biệt là bình phương số âm). Khi tính sai, học sinh phải làm lại từ đầu hoặc hoang mang vì kết quả không có trong tùy chọn.', advice: 'Hướng dẫn học sinh sử dụng phím CALC trên máy tính sau khi tìm được $x$. Hoặc dùng chức năng tìm Max/Min trong mode giải phương trình bậc hai để kiểm tra kết quả tức thì.' },

            document.getElementById('ui-select-class-label').innerText = UI_TEXT[lang].selectClass;
            document.getElementById('btn-top-mistakes').innerText = UI_TEXT[lang].btnMistakes;
            document.getElementById('btn-top-time').innerText = UI_TEXT[lang].btnTime;
            document.getElementById('btn-top-attempts').innerText = UI_TEXT[lang].btnAttempts;
            
            document.getElementById('ui-col-class').innerText = UI_TEXT[lang].colClass;
            document.getElementById('ui-col-members').innerText = UI_TEXT[lang].colMembers;
            document.getElementById('ui-col-mode').innerText = UI_TEXT[lang].colMode;
            document.getElementById('ui-col-status').innerText = UI_TEXT[lang].colStatus;
            document.getElementById('ui-col-progress').innerText = UI_TEXT[lang].colProgress;
            document.getElementById('ui-col-duration').innerText = UI_TEXT[lang].colDuration;
            document.getElementById('ui-col-wrong').innerText = UI_TEXT[lang].colWrong;
            document.getElementById('ui-col-topics').innerText = UI_TEXT[lang].colTopics;
            document.getElementById('ui-col-action').innerText = UI_TEXT[lang].colAction;
            
            document.getElementById('ui-prompt-title').innerText = UI_TEXT[lang].promptTitle;
            document.getElementById('btn-prompt-1').innerText = UI_TEXT[lang].btnPrompt1;
            document.getElementById('btn-prompt-2').innerText = UI_TEXT[lang].btnPrompt2;
            document.getElementById('btn-prompt-3').innerText = UI_TEXT[lang].btnPrompt3;
            renderTable();
        }

        function drawAnalysisChart(metricMap, type, lang) {
            document.getElementById('chart-container').style.display = 'block';
            let ctx = document.getElementById('analysisChart').getContext('2d');
            if (currentChart) currentChart.destroy();
            let labels = [];
            let dataPoints = [];

            if(type === 'mistakes') {
                let sortedKeys = Object.keys(metricMap).sort((a,b) => metricMap[b] - metricMap[a]);
                // Nếu ngôn ngữ là Tiếng Việt, hiển thị Tên Tiếng Việt trên Chart, nếu không thì dùng key gốc
                labels = sortedKeys.map(k => (lang === 'vi' && PEDAGOGY_DATA.vi.mistakes[k]) ? PEDAGOGY_DATA.vi.mistakes[k].title : k);
                sortedKeys.forEach(t => dataPoints.push(metricMap[t]));
                currentChart = new Chart(ctx, { 
                    type: 'bar', 
                    data: { labels: labels, datasets: [{ label: lang === 'en' ? 'Frequency of Review Topics' : 'Tần suất xuất hiện (Nhóm)', data: dataPoints, backgroundColor: '#dc3545' }] }, 
                    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y' }
                });
            } else if (type === 'time') {
                labels = ["Q1", "Q2", "Q3", "Q4", "Q5", "Q6", "Q7"];
                labels.forEach(q => dataPoints.push(metricMap[q] && metricMap[q].count > 0 ? Math.round(metricMap[q].total / metricMap[q].count) : 0));
                currentChart = new Chart(ctx, { type: 'line', data: { labels: labels, datasets: [{ label: lang === 'en' ? 'Avg Time (Seconds)' : 'Thời gian TB (Giây)', data: dataPoints, borderColor: '#6f42c1', backgroundColor: 'rgba(111, 66, 193, 0.2)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false } });
            } else if (type === 'attempts') {
                labels = ["Q1", "Q2", "Q3", "Q4", "Q5", "Q6", "Q7"];
                labels.forEach(q => dataPoints.push(metricMap[q] && metricMap[q].count > 0 ? (metricMap[q].total / metricMap[q].count).toFixed(2) : 0));
                currentChart = new Chart(ctx, { type: 'bar', data: { labels: labels, datasets: [{ label: lang === 'en' ? 'Avg Attempts / Group' : 'Số lần thử TB / Nhóm', data: dataPoints, backgroundColor: '#ffc107' }] }, options: { responsive: true, maintainAspectRatio: false } });
            }
        }

        function extractFullMetrics(dataList, type) {
            let metricMap = {};
            
            if (type === 'mistakes') {
                dataList.forEach(row => {
                    if(row.reviewTopics && row.reviewTopics !== "None" && row.reviewTopics !== "Perfect Run") {
                        let topics = row.reviewTopics.split(",").map(t => t.trim());
                        topics.forEach(t => {
                            if(t) metricMap[t] = (metricMap[t] || 0) + 1;
                        });
                    }
                });
            } 
            else if (type === 'time') {
                dataList.forEach(row => {
                    if (row.questionTimes) {
                        for(let q in row.questionTimes) {
                            if(!metricMap[q]) metricMap[q] = { total: 0, count: 0 };
                            metricMap[q].total += row.questionTimes[q]; metricMap[q].count++;
                        }
                    }
                });
            } 
            else if (type === 'attempts') {
                let questions = ["Q1", "Q2", "Q3", "Q4", "Q5", "Q6", "Q7"];
                questions.forEach(q => metricMap[q] = { total: 0, count: 0 });
                
                dataList.forEach(row => {
                    let wArr = [];
                    if (row.wrongAnswers && row.wrongAnswers !== "None") {
                        wArr = row.wrongAnswers.split(",").map(s => s.trim().substring(0,2));
                    }
                    
                    questions.forEach(q => {
                        let mistakesCount = wArr.filter(ans => ans === q).length;
                        metricMap[q].total += (1 + mistakesCount);
                        metricMap[q].count++; 
                    });
                });
            }
            return metricMap;
        }

        function generateReport(type) {
            currentAnalysisType = type;
            const targetClass = document.getElementById('ai-target-class').value;
            const lang = document.getElementById('app-language').value;
            let analysisData = rawData;
            if (targetClass !== "ALL") analysisData = rawData.filter(r => r.class === targetClass);
            if(analysisData.length === 0) { alert(lang === 'en' ? "No data available for this class." : "Không có dữ liệu cho lớp này."); return; }

            let fullMetrics = extractFullMetrics(analysisData, type);
            drawAnalysisChart(fullMetrics, type, lang);

            let sortedArr = [];
            if(type === 'mistakes') {
                sortedArr = Object.keys(fullMetrics).map(k => ({ q: k, val: fullMetrics[k] })).sort((a,b) => b.val - a.val);
            } else {
                sortedArr = Object.keys(fullMetrics).map(k => ({ q: k, val: (fullMetrics[k].total / fullMetrics[k].count).toFixed(2) })).sort((a,b) => b.val - a.val);
            }
            
            let top3Data = sortedArr.slice(0, 3);
            currentTop3List = top3Data.map(item => item.q);

            let htmlContent = "";
            
            if(type === 'mistakes') {
                document.getElementById('ai-result-title').innerText = lang === 'en' ? "Top Weakness Topics" : "Các Chủ Đề Yếu Nhất";
                htmlContent += `<h3>${UI_TEXT[lang].reportTitleMistakes}</h3><ul>`;
                top3Data.forEach(item => {
                    let d = PEDAGOGY_DATA[lang].mistakes[item.q];
                    if(d) {
                        // Lấy Title tiếng Việt nếu có, ngược lại giữ nguyên gốc
                        let displayTitle = (lang === 'vi' && d.title) ? d.title : item.q;
                        htmlContent += `<li><strong>[Topic] ${displayTitle} (${item.val} ${lang==='en'?'groups':'nhóm mắc phải'})</strong><br>
                                        <i>${lang==='en'?'Knowledge Gap':'Lỗi sai'}</i>: ${d.gap}<br>
                                        <i>${lang==='en'?'Reason':'Lý do'}</i>: ${d.reason}<br>
                                        <i>${lang==='en'?'Advice':'Lời khuyên'}</i>: ${d.advice}</li>`;
                    }
                });
                htmlContent += "</ul>";
            } else if (type === 'time') {
                document.getElementById('ai-result-title').innerText = lang === 'en' ? "Time Allocation per Question" : "Thời Gian Phân Bổ Từng Câu";
                htmlContent += `<h3>${UI_TEXT[lang].reportTitleTime}</h3><ul>`;
                top3Data.forEach(item => {
                    let d = PEDAGOGY_DATA[lang].time[item.q];
                    if(d) {
                        htmlContent += `<li><strong>${item.q} (Avg: ${item.val}s)</strong>: ${d.qContent}<br>
                                        <i>${lang==='en'?'Difficulty':'Khó khăn'}</i>: ${d.gap}<br>
                                        <i>${lang==='en'?'Reason for Time Lag':'Lý do tốn thời gian'}</i>: ${d.reason}<br>
                                        <i>${lang==='en'?'Advice':'Lời khuyên'}</i>: ${d.advice}</li>`;
                    }
                });
                htmlContent += "</ul>";
            } else if (type === 'attempts') {
                document.getElementById('ai-result-title').innerText = lang === 'en' ? "Average Attempts per Question" : "Số Lần Thử Trung Bình Từng Câu";
                htmlContent += `<h3>${UI_TEXT[lang].reportTitleAttempts}</h3><ul>`;
                top3Data.forEach(item => {
                    let d = PEDAGOGY_DATA[lang].attempts[item.q];
                    if(d) {
                        htmlContent += `<li><strong>${item.q} (Avg attempts: ${item.val})</strong>: ${d.qContent}<br>
                                        <i>${lang==='en'?'Difficulty':'Khó khăn'}</i>: ${d.gap}<br>
                                        <i>${lang==='en'?'Reason for Trial & Error':'Lý do thử và sai'}</i>: ${d.reason}<br>
                                        <i>${lang==='en'?'Advice':'Lời khuyên'}</i>: ${d.advice}</li>`;
                    }
                });
                htmlContent += "</ul>";
            }

            document.getElementById('ai-output').innerHTML = htmlContent;
            document.getElementById('ai-result-modal').style.display = 'block';

            // GỌI LẠI MATHJAX SAU KHI HTML ĐƯỢC CHÈN VÀO TRANG ĐỂ RENDER LATEX
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('ai-output')]).catch(function (err) {
                    console.log('MathJax typeset failed: ', err.message);
                });
            }
        }

        window.copyPrompt = function(actionType) {
            const lang = document.getElementById('app-language').value;
            let contextDetails = "";

            currentTop3List.forEach(q => {
                let d = PEDAGOGY_DATA[lang][currentAnalysisType][q];
                if (d) {
                    if (currentAnalysisType === 'mistakes') {
                        let displayTitle = (lang === 'vi' && d.title) ? d.title : q;
                        contextDetails += `\n\n- ${lang==='en'?'Topic':'Chủ đề'}: ${displayTitle}\n- ${lang==='en'?'Knowledge Gap':'Lỗ hổng kiến thức'}: ${d.gap}\n- ${lang==='en'?'Reason for this error':'Lý do học sinh mắc phải sai lầm này'}: ${d.reason}`;
                    } else {
                        contextDetails += `\n\n- ${lang==='en'?'Question':'Câu hỏi'}: ${d.qContent}\n- ${lang==='en'?'Gap/Difficulty':'Khó khăn/Lỗi sai về kỹ năng'}: ${d.gap}\n- ${lang==='en'?'Reason':'Lý do học sinh mắc phải sai lầm này'}: ${d.reason}`;
                    }
                }
            });

            let actionText = "";
            if (actionType === 'deep_analysis') {
                actionText = lang === 'en' 
                    ? "provide a deeper analysis of the root causes of these errors from a cognitive psychology perspective and suggest intervention strategies." 
                    : "phân tích sâu hơn về nguyên nhân gốc rễ của những lỗi sai này xét trên góc độ tâm lý học nhận thức và đề xuất hướng can thiệp.";
            } else if (actionType === 'activity') {
                actionText = lang === 'en' 
                    ? "suggest 3 creative learning activities (games, group discussions, etc.) lasting 10-15 minutes to help students overcome these specific errors." 
                    : "gợi ý 3 hoạt động học tập sáng tạo (trò chơi, thảo luận nhóm,...) kéo dài 10-15 phút để giúp học sinh khắc phục những lỗi sai này.";
            } else if (actionType === 'exam') {
                actionText = lang === 'en' 
                    ? "propose 5 new assessment questions (with answers and explanations) specifically designed with pedagogical distractors to test these exact knowledge gaps." 
                    : "đề xuất 5 câu hỏi kiểm tra đánh giá mới (kèm đáp án và giải thích) được thiết kế đặc biệt để gài bẫy và kiểm tra đúng vào những lỗ hổng kiến thức này.";
            }

            let finalPrompt = "";
            if (lang === 'en') {
                finalPrompt = `Act as an experienced high school math teacher and instructional designer. According to the data report, my students are frequently struggling with the following topics/questions about parabolas: ${contextDetails}\n\nBased on this data, please ${actionText}`;
            } else {
                finalPrompt = `Đóng vai một giáo viên toán phổ thông có nhiều kinh nghiệm trong thiết kế giảng dạy. Theo báo cáo dữ liệu, học sinh của tôi thường mắc lỗi hoặc gặp khó khăn ở các chủ đề sau về parabol: ${contextDetails}\n\nTừ những dữ liệu trên, hãy ${actionText}`;
            }

            navigator.clipboard.writeText(finalPrompt).then(() => {
                alert(lang === 'en' ? "Prompt copied to clipboard! Paste it into your AI." : "Đã sao chép Prompt vào bộ nhớ tạm! Bạn có thể dán vào công cụ AI.");
            });
        }

        window.closeModal = function(id) { 
            document.getElementById(id).style.display = 'none'; 
            if (currentChart) { currentChart.destroy(); currentChart = null; }
            document.getElementById('chart-container').style.display = 'none';
        };

        window.setSort = function(col) { if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; } renderTable(); };
        window.parseDuration = function(durStr) { if(!durStr || durStr === "N/A") return 0; let m = 0, s = 0; let matchM = durStr.match(/(\d+)m/); let matchS = durStr.match(/(\d+)s/); if(matchM) m = parseInt(matchM[1]); if(matchS) s = parseInt(matchS[1]); return m * 60 + s; };
        window.getStatusRank = function(status) { let s = (status || "").toLowerCase(); if (s.includes("victory")) return 4; if (s.includes("game over")) return 3; if (s.includes("playing")) return 2; return 1; };
        window.deleteEntry = function(id) { const lang = document.getElementById('app-language').value; let msg = lang === 'en' ? "Are you sure you want to delete this record?" : "Bạn có chắc chắn muốn xóa bản ghi này?"; if (confirm(msg)) db.ref('sessions/' + id).remove(); };

        window.renderTable = function() {
            let fClass = document.getElementById("filter-class").value; let fMode = document.getElementById("filter-mode").value; let fWrong = document.getElementById("filter-wrong").value; let fTopic = document.getElementById("filter-topic").value; const lang = document.getElementById('app-language').value;
            currentFilteredData = rawData.filter(row => {
                if (fClass && row.class !== fClass) return false; if (fMode && row.mode !== fMode) return false; if (fWrong && !(row.wrongAnswers || "").includes(fWrong)) return false; if (fTopic && !(row.reviewTopics || "").includes(fTopic)) return false; return true;
            });

            if (sortCol) { currentFilteredData.sort((a, b) => { let valA, valB; if (sortCol === 'name') { valA = (a.name || "").toLowerCase(); valB = (b.name || "").toLowerCase(); } else if (sortCol === 'progress') { valA = a.progress || 0; valB = b.progress || 0; } else if (sortCol === 'duration') { valA = parseDuration(a.duration); valB = parseDuration(b.duration); } else if (sortCol === 'status') { valA = getStatusRank(a.status); valB = getStatusRank(b.status); } if (valA < valB) return sortAsc ? -1 : 1; if (valA > valB) return sortAsc ? 1 : -1; return 0; }); }

            let statsText = lang === 'en' ? `Showing: ${currentFilteredData.length} groups.` : `Hiển thị: ${currentFilteredData.length} nhóm.`;
            document.getElementById("stats-container").innerText = statsText;

            const tbody = document.getElementById('student-list'); tbody.innerHTML = "";
            if (currentFilteredData.length === 0) { let msg = lang === 'en' ? "No data" : "Không có dữ liệu"; tbody.innerHTML = `<tr><td colspan="9" style="text-align: center;">${msg}</td></tr>`; return; }

            currentFilteredData.forEach(student => {
                let statusClass = "status-none"; let sLow = (student.status || "").toLowerCase();
                if (sLow === "playing" || sLow === "waiting") statusClass = "status-playing"; else if (sLow.includes("finished")) statusClass = "status-finished";
                let tr = document.createElement('tr');
                tr.innerHTML = `<td><b>${student.class || ""}</b></td><td>${student.name || ""}</td><td><b>${(student.mode || "practice").toUpperCase()}</b></td><td class="${statusClass}">${(student.status || "").toUpperCase()}</td><td><span class="progress-badge">${student.progress || 0} / 7</span></td><td>${student.duration || "N/A"}</td><td>${student.wrongAnswers || "None"}</td><td><small>${student.reviewTopics || "Perfect Run"}</small></td><td style="text-align: center;"><button class="delete-btn" onclick="deleteEntry('${student.firebaseId}')">🗑️</button></td>`;
                tbody.appendChild(tr);
            });
        };
        changeLanguage();
    </script>
