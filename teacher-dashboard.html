<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard - Analytics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { color: #1a2a6c; margin: 0; text-transform: uppercase; text-shadow: 2px 2px 0px #ccc; }
        
        .stats-bar { text-align: center; background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; color: #333; font-weight: bold; border: 2px dashed #ccc; }
        
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1a2a6c; color: white; font-size: 14px; vertical-align: top; }
        tr:hover { background-color: #f1f1f1; }
        
        /* Tăng độ rộng cột tiến độ */
        .col-progress { width: 120px; text-align: center; }

        .sortable { cursor: pointer; user-select: none; }
        .sortable:hover { color: #FFD700; }
        .filter-select { width: 100%; margin-top: 8px; padding: 4px; font-size: 13px; border-radius: 4px; border: none; outline: none; color: #333; }
        
        .status-playing { color: #ff8a00; font-weight: bold; }
        .status-finished { color: #28a745; font-weight: bold; }
        .status-none { color: #dc3545; font-weight: bold; }
        .progress-badge { background: #007bff; color: white; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .delete-btn { background: none; border: none; cursor: pointer; font-size: 20px; transition: 0.2s; opacity: 0.7; }
        .delete-btn:hover { transform: scale(1.3); opacity: 1; }

        .ai-panel { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 6px solid #6f42c1; margin-bottom: 20px; }
        .ai-btn { background: #6f42c1; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-right: 10px; margin-bottom: 10px; }
        .ai-btn:hover { background: #5a32a3; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9000; }
        .modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 6px solid #6f42c1;}
        .modal-close { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; }
        
        .ai-output-content { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; line-height: 1.6; font-size: 15px; margin-top: 15px; }
        .ai-output-content h3 { color: #1a2a6c; margin-top: 0px; margin-bottom: 10px; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
        .ai-output-content li { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; list-style: none; }
        
        #chart-container { width: 100%; max-height: 250px; margin-bottom: 20px; display: none; }
        
        .prompt-container { margin-top: 20px; background: #e9ecef; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; display: flex; flex-direction: column; gap: 10px; }
        .btn-prompt { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-analysis { background-color: #17a2b8; color: white; }
        .btn-activity { background-color: #ffc107; color: #333; }
        .btn-exam { background-color: #28a745; color: white; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header-container" style="justify-content: center; margin: 20px 0 30px 0;">
        <h1 id="ui-title">BẢNG THEO DÕI KẾT QUẢ HỌC TẬP</h1>
    </div>

    <div class="ai-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 id="ui-analytics-title" style="color: #6f42c1; margin: 0;">PHÂN TÍCH SƯ PHẠM</h2>
            <select id="app-language" onchange="changeLanguage()" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; cursor: pointer;">
                <option value="vi">🇻🇳 Tiếng Việt</option>
                <option value="en">🇬🇧 English</option>
            </select>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label id="ui-select-class-label" style="font-weight: bold; margin-right: 10px;">Chọn lớp cần phân tích:</label>
            <select id="ai-target-class" style="padding: 8px; border-radius: 5px;">
                <option value="ALL">Tất cả học sinh</option>
                <option value="10A">Lớp 10A</option>
                <option value="10B">Lớp 10B</option>
            </select>
        </div>

        <div>
            <button class="ai-btn" id="btn-mistakes" onclick="generateReport('mistakes')">PHÂN TÍCH LỖI SAI</button>
            <button class="ai-btn" id="btn-time" onclick="generateReport('time')">PHÂN TÍCH THỜI GIAN THỰC HIỆN</button>
            <button class="ai-btn" id="btn-attempts" onclick="generateReport('attempts')">PHÂN TÍCH SỐ LẦN THỬ VÀ SAI</button>
        </div>
    </div>

    <div id="stats-container" class="stats-bar">Đang tải dữ liệu...</div>
    
    <table id="dashboard-table">
        <thead>
            <tr>
                <th><span id="ui-col-class">Lớp</span><select id="filter-class" class="filter-select" onchange="renderTable()"><option value="">Tất cả</option><option value="10A">10A</option><option value="10B">10B</option></select></th>
                <th class="sortable" onclick="setSort('name')"><span id="ui-col-members">Thành viên</span> ↕</th>
                <th><span id="ui-col-mode">Chế độ</span><select id="filter-mode" class="filter-select" onchange="renderTable()"><option value="">Tất cả</option><option value="practice">Luyện tập</option><option value="combat">Đối kháng</option></select></th>
                <th class="sortable" onclick="setSort('status')"><span id="ui-col-status">Trạng thái</span> ↕</th>
                <th class="sortable col-progress" onclick="setSort('progress')"><span id="ui-col-progress">Tiến độ</span> ↕</th>
                <th class="sortable" onclick="setSort('duration')"><span id="ui-col-duration">Thời gian</span> ↕</th>
                <th><span id="ui-col-wrong">Câu sai</span></th>
                <th><span id="ui-col-topics">Chủ đề ôn tập</span></th>
                <th style="text-align: center;"><span id="ui-col-action">Hành động</span></th>
            </tr>
        </thead>
        <tbody id="student-list"></tbody>
    </table>

    <div id="ai-result-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('ai-result-modal')">X</button>
            <h2 id="ai-result-title" style="margin-top: 0; color: #6f42c1;">Kết quả phân tích</h2>
            <div id="chart-container"><canvas id="analysisChart"></canvas></div>
            <div id="ai-output" class="ai-output-content"></div>
            <div class="prompt-container">
                <div class="prompt-title" id="ui-prompt-title">Lựa chọn lệnh AI:</div>
                <button class="btn-prompt btn-analysis" id="p-btn-1" onclick="copyPrompt('deep_analysis')">Sao chép lệnh AI giúp phân tích sâu hơn</button>
                <button class="btn-prompt btn-activity" id="p-btn-2" onclick="copyPrompt('activity')">Sao chép lệnh AI giúp gợi ý hoạt động học tập</button>
                <button class="btn-prompt btn-exam" id="p-btn-3" onclick="copyPrompt('exam')">Sao chép lệnh AI giúp đề xuất nội dung kiểm tra</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // ------------------------------------------------------------------
        // 1. DỮ LIỆU CÂU HỎI VÀ LỖI SAI (ĐÃ LOẠI BỎ $$ VÀ DÙNG HÀM SỐ CHUNG)
        // ------------------------------------------------------------------
        const MASTER_PEDAGOGY = {
            vi: {
                "Q1:B": { label: "Lỗi thiên kiến phủ định (Q1)", q: "Xác định chiều bề lõm (hàm số bậc hai)", choice: "B (Sai)", gap: "Nhận diện hệ số a", reason: "Học sinh thấy hệ số âm nên mặc định chọn phát biểu là Sai.", advice: "Dùng quy tắc Mặt cười/Mếu." },
                "Q2:A": { label: "Lỗi dấu hoành độ đỉnh (Q2)", q: "Công thức tọa độ đỉnh (hàm số bậc hai)", choice: "A/D", gap: "Ghi nhớ công thức", reason: "Nhầm lẫn với định lý Vi-ét, quên dấu trừ ở hoành độ.", advice: "Nhấn mạnh cả x và y đều có dấu trừ." },
                "Q2:C": { label: "Lỗi dấu tung độ đỉnh (Q2)", q: "Công thức tọa độ đỉnh (hàm số bậc hai)", choice: "C", gap: "Ghi nhớ công thức", reason: "Quên dấu trừ trước Delta.", advice: "Yêu cầu viết công thức ra lề vở." },
                "Q3:C": { label: "Lỗi định dạng đường thẳng (Q3)", q: "Phương trình trục đối xứng (hàm số bậc hai)", choice: "C/D", gap: "Phương trình đường thẳng", reason: "Nhầm giữa x= (đứng) và y= (ngang).", advice: "Vẽ trục đối xứng cắt trục x." },
                "Q3:A": { label: "Lỗi tính toán dấu (Q3)", q: "Phương trình trục đối xứng (hàm số bậc hai)", choice: "A", gap: "Kỹ năng tính toán", reason: "Sai dấu khi chia số âm.", advice: "Dạy quy tắc đếm dấu trừ." },
                "Q4:A": { label: "Lỗi thứ tự phép tính (Q4)", q: "Tính tọa độ đỉnh (hàm số bậc hai)", choice: "A", gap: "Thay số vào hàm", reason: "Không đóng ngoặc số âm khi bình phương.", advice: "Dùng phím CALC trên máy tính." },
                "Q6:A": { label: "Lỗi Max/Min (Q6)", q: "Tìm GTLN/GTNN (hàm số bậc hai)", choice: "A/D", gap: "Phân biệt cực trị", reason: "Hệ số âm tưởng là nhỏ nhất.", advice: "Dùng ẩn dụ Núi/Thung lũng." }
            },
            en: {
                "Q1:B": { label: "Negative Bias (Q1)", q: "Determine concavity (quadratic function)", choice: "B (False)", gap: "Coefficient identification", reason: "Seeing a negative value makes students assume 'False'.", advice: "Use Smile/Frown rule." },
                "Q2:A": { label: "X-Coordinate Sign Error (Q2)", q: "Vertex formula (quadratic function)", choice: "A/D", gap: "Formula recall", reason: "Confusion with Vieta's theorem, missing minus sign.", advice: "Emphasize minus signs for both coordinates." },
                "Q2:C": { label: "Y-Coordinate Sign Error (Q2)", q: "Vertex formula (quadratic function)", choice: "C", gap: "Formula recall", reason: "Forgot minus sign before Delta.", advice: "Write formula in the margin." },
                "Q3:C": { label: "Line Format Error (Q3)", q: "Axis of symmetry (quadratic function)", choice: "C/D", gap: "Line equations", reason: "Confusing x= (vertical) with y= (horizontal).", advice: "Draw axis crossing the x-axis." },
                "Q3:A": { label: "Arithmetic Sign Error (Q3)", q: "Axis of symmetry (quadratic function)", choice: "A", gap: "Calculation skills", reason: "Incorrect division with negative numbers.", advice: "Teach sign-counting rule." },
                "Q4:A": { label: "Order of Ops Error (Q4)", q: "Calculate vertex (quadratic function)", choice: "A", gap: "Substitution", reason: "Missing parentheses when squaring negatives.", advice: "Use calculator CALC function." },
                "Q6:A": { label: "Max/Min Confusion (Q6)", q: "Find Max/Min (quadratic function)", choice: "A/D", gap: "Extrema identification", reason: "Negative a incorrectly associated with 'Minimum'.", advice: "Use Mountain/Valley analogy." }
            }
        };

        const UI_TEXT = {
            vi: {
                title: "BẢNG THEO ĐÕI KẾT QUẢ HỌC TẬP", analyticsTitle: "PHÂN TÍCH SƯ PHẠM", selectClass: "Chọn lớp cần phân tích:",
                btnMistakes: "PHÂN TÍCH LỖI SAI", btnTime: "PHÂN TÍCH THỜI GIAN THỰC HIỆN", btnAttempts: "PHÂN TÍCH SỐ LẦN THỬ VÀ SAI",
                colClass: "Lớp", colMembers: "Thành viên", colMode: "Chế độ", colStatus: "Trạng thái", colProgress: "Tiến độ", colDuration: "Thời gian", colWrong: "Câu sai", colTopics: "Chủ đề ôn tập", colAction: "Hành động",
                promptTitle: "Lựa chọn lệnh AI:", btnPrompt1: "Sao chép lệnh AI giúp phân tích sâu hơn", btnPrompt2: "Sao chép lệnh AI giúp gợi ý hoạt động học tập", btnPrompt3: "Sao chép lệnh AI giúp đề xuất nội dung kiểm tra",
                statusPlaying: "Đang chơi", statusFinished: "Đã xong", statusNone: "Chưa bắt đầu",
                wrongLabel: "Sai", timesLabel: "lần", avgLabel: "Trung bình",
                topics: { "Concavity": "Bề lõm", "Vertex Formula": "Công thức đỉnh", "Axis of Symmetry": "Trục đối xứng", "Calculate Vertex": "Tính tọa độ đỉnh", "Monotonicity": "Sự biến thiên", "Extrema": "Cực trị", "Comprehensive": "Tổng hợp" }
            },
            en: {
                title: "STUDENT RESULT DASHBOARD", analyticsTitle: "PEDAGOGICAL ANALYSIS", selectClass: "Select Class to Analyze:",
                btnMistakes: "MISTAKES ANALYSIS", btnTime: "TIME ALLOCATION ANALYSIS", btnAttempts: "ATTEMPTS ANALYSIS",
                colClass: "Class", colMembers: "Members", colMode: "Mode", colStatus: "Status", colProgress: "Progress", colDuration: "Duration", colWrong: "Wrong Answers", colTopics: "Review Topics", colAction: "Action",
                promptTitle: "AI Prompt Options:", btnPrompt1: "Copy prompt AI for deep analysis", btnPrompt2: "Copy prompt AI for activity suggestions", btnPrompt3: "Copy prompt AI for exam recommendations",
                statusPlaying: "Playing", statusFinished: "Finished", statusNone: "Not Started",
                wrongLabel: "Wrong", timesLabel: "times", avgLabel: "Average",
                topics: { "Concavity": "Concavity", "Vertex Formula": "Vertex Formula", "Axis of Symmetry": "Axis of Symmetry", "Calculate Vertex": "Calculate Vertex", "Monotonicity": "Monotonicity", "Extrema": "Extrema", "Comprehensive": "Comprehensive" }
            }
        };

        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyBFudz97TIDFD7dUZuVIKB-IH0vcz6bA-M", authDomain: "the-meow-thematics-quest.firebaseapp.com", databaseURL: "https://the-meow-thematics-quest-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "the-meow-thematics-quest", storageBucket: "the-meow-thematics-quest.firebasestorage.app", messagingSenderId: "640229575133", appId: "1:640229575133:web:28c8533120bcdbe2b78e34" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let rawData = [];
        let sortCol = '';
        let sortAsc = true;
        let currentChart = null;
        let currentTopMistakes = [];

        db.ref('sessions').on('value', (snap) => {
            rawData = [];
            const data = snap.val();
            if (data) { for (let id in data) { let r = data[id]; r.firebaseId = id; rawData.push(r); } }
            renderTable();
        });

        function changeLanguage() {
            const lang = document.getElementById('app-language').value;
            const ui = UI_TEXT[lang];
            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-analytics-title').innerText = ui.analyticsTitle;
            document.getElementById('ui-select-class-label').innerText = ui.selectClass;
            document.getElementById('btn-mistakes').innerText = ui.btnMistakes;
            document.getElementById('btn-time').innerText = ui.btnTime;
            document.getElementById('btn-attempts').innerText = ui.btnAttempts;
            document.getElementById('ui-col-class').innerText = ui.colClass;
            document.getElementById('ui-col-members').innerText = ui.colMembers;
            document.getElementById('ui-col-mode').innerText = ui.colMode;
            document.getElementById('ui-col-status').innerText = ui.colStatus;
            document.getElementById('ui-col-progress').innerText = ui.colProgress;
            document.getElementById('ui-col-duration').innerText = ui.colDuration;
            document.getElementById('ui-col-wrong').innerText = ui.colWrong;
            document.getElementById('ui-col-topics').innerText = ui.colTopics;
            document.getElementById('ui-col-action').innerText = ui.colAction;
            document.getElementById('ui-prompt-title').innerText = ui.promptTitle;
            document.getElementById('p-btn-1').innerText = ui.btnPrompt1;
            document.getElementById('p-btn-2').innerText = ui.btnPrompt2;
            document.getElementById('p-btn-3').innerText = ui.btnPrompt3;
            renderTable();
        }

        // --- CORE ANALYTICS ---
        
        function extractDetailedData(dataList) {
            let mistakeStats = {}; // { "Q3:A": count }
            let attemptStats = {}; // { "Q3": { total: 0, count: 0 } }
            
            dataList.forEach(row => {
                if (row.wrongAnswers && row.wrongAnswers !== "None") {
                    let parts = row.wrongAnswers.split(",").map(p => p.trim());
                    let studentAttempts = {}; 

                    parts.forEach(part => {
                        // Regex bóc tách dạng Q3:A hoặc Q3
                        let match = part.match(/(Q\d+)(?::([A-D]))?/);
                        if (match) {
                            let qId = match[1];
                            let option = match[2] || "A"; // Mặc định A nếu không có option
                            let key = `${qId}:${option}`;
                            
                            mistakeStats[key] = (mistakeStats[key] || 0) + 1;
                            studentAttempts[qId] = (studentAttempts[qId] || 0) + 1;
                        }
                    });

                    for (let q in studentAttempts) {
                        if (!attemptStats[q]) attemptStats[q] = { sum: 0, n: 0 };
                        attemptStats[q].sum += studentAttempts[q];
                        attemptStats[q].n += 1;
                    }
                }
            });
            return { mistakeStats, attemptStats };
        }

        function generateReport(type) {
            const target = document.getElementById('ai-target-class').value;
            const lang = document.getElementById('app-language').value;
            let filtered = target === "ALL" ? rawData : rawData.filter(r => r.class === target);
            
            if (filtered.length === 0) return alert("No data");

            const { mistakeStats, attemptStats } = extractDetailedData(filtered);
            let html = "";
            currentTopMistakes = [];

            if (type === 'mistakes') {
                let sorted = Object.keys(mistakeStats).sort((a,b) => mistakeStats[b] - mistakeStats[a]).slice(0, 3);
                html = `<ul>`;
                sorted.forEach(key => {
                    let d = MASTER_PEDAGOGY[lang][key] || MASTER_PEDAGOGY[lang][key.split(':')[0]+":A"];
                    if (d) {
                        currentTopMistakes.push({ ...d, count: mistakeStats[key] });
                        html += `<li><strong>${d.label} (${mistakeStats[key]} lỗi)</strong><br>
                                 - Câu hỏi: ${d.q}<br> - Lỗ hổng: ${d.gap}<br> - Lý do: ${d.reason}<br> - Khuyên: ${d.advice}</li>`;
                    }
                });
                html += `</ul>`;
            } else if (type === 'attempts') {
                let sortedQ = Object.keys(attemptStats).sort((a,b) => (attemptStats[b].sum/attemptStats[b].n) - (attemptStats[a].sum/attemptStats[a].n)).slice(0, 3);
                html = `<ul>`;
                sortedQ.forEach(q => {
                    let avg = (attemptStats[q].sum / attemptStats[q].n).toFixed(1);
                    let d = MASTER_PEDAGOGY[lang][q+":A"] || { q: "Bài tập Parabol", gap: "Kỹ năng giải bài", reason: "Chưa nắm vững phương pháp", advice: "Luyện tập thêm" };
                    html += `<li><strong>${q} (Trung bình ${avg} lần thử)</strong><br>
                             - Nội dung: ${d.q}<br> - Khó khăn: ${d.gap}<br> - Lý do: ${d.reason}</li>`;
                });
                html += `</ul>`;
            } else if (type === 'time') {
                // Logic thời gian tương tự phiên bản trước
                html = `<p>Phân tích thời gian dựa trên dữ liệu 7 câu hỏi...</p>`;
            }

            document.getElementById('ai-output').innerHTML = html;
            document.getElementById('ai-result-modal').style.display = 'block';
        }

        function copyPrompt(action) {
            const lang = document.getElementById('app-language').value;
            let details = "";
            currentTopMistakes.forEach(m => {
                details += `\n- Câu hỏi: ${m.q}, Đáp án sai: ${m.choice}, Lỗi sai: ${m.gap}. Lý do: ${m.reason}`;
            });

            let actionText = {
                vi: { deep_analysis: "phân tích sâu hơn nguyên nhân gốc rễ", activity: "gợi ý hoạt động học tập sáng tạo", exam: "đề xuất 5 câu hỏi kiểm tra tương tự" },
                en: { deep_analysis: "provide a deep root cause analysis", activity: "suggest creative activities", exam: "propose 5 exam-style questions" }
            }[lang][action];

            let prompt = lang === 'vi' 
                ? `Đóng vai giáo viên toán kinh nghiệm. Học sinh tôi thường mắc lỗi sau: ${details}. Hãy ${actionText}.`
                : `Act as an experienced math teacher. My students often make these mistakes: ${details}. Please ${actionText}.`;

            navigator.clipboard.writeText(prompt).then(() => alert("Copied!"));
        }

        // --- UI UTILS ---

        function renderTable() {
            const lang = document.getElementById('app-language').value;
            const ui = UI_TEXT[lang];
            const tbody = document.getElementById('student-list');
            tbody.innerHTML = "";

            let fClass = document.getElementById("filter-class").value;
            let fMode = document.getElementById("filter-mode").value;

            let filtered = rawData.filter(r => (!fClass || r.class === fClass) && (!fMode || r.mode === fMode));

            filtered.forEach(s => {
                // Việt hóa Trạng thái
                let statusText = ui.statusNone;
                let sLow = (s.status || "").toLowerCase();
                if (sLow.includes("playing")) statusText = ui.statusPlaying;
                else if (sLow.includes("finished") || sLow.includes("victory")) statusText = ui.statusFinished;

                // Việt hóa Chủ đề
                let topics = (s.reviewTopics || "Perfect Run").split(",").map(t => ui.topics[t.trim()] || t.trim()).join(", ");

                // Anh/Việt hóa Câu sai
                let wrongDisplay = s.wrongAnswers || "None";
                if (lang === 'en' && wrongDisplay !== "None") {
                    // Đã chuẩn hóa sẵn trong logic truyền lên Firebase (Q1, Q2...)
                } else if (lang === 'vi' && wrongDisplay !== "None") {
                    let count = (wrongDisplay.match(/,/g) || []).length + 1;
                    wrongDisplay = `${ui.wrongLabel} ${count} ${ui.timesLabel} (${s.wrongAnswers})`;
                }

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${s.class || ""}</b></td>
                    <td>${s.name || ""}</td>
                    <td>${s.mode === 'practice' ? (lang==='vi'?'Luyện tập':'Practice') : (lang==='vi'?'Đối kháng':'Combat')}</td>
                    <td>${statusText}</td>
                    <td class="col-progress"><span class="progress-badge">${s.progress || 0} / 7</span></td>
                    <td>${s.duration || "N/A"}</td>
                    <td><small>${wrongDisplay}</small></td>
                    <td><small>${topics}</small></td>
                    <td style="text-align: center;"><button class="delete-btn" onclick="deleteEntry('${s.firebaseId}')">🗑️</button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('stats-container').innerText = `${lang==='vi'?'Hiển thị':'Showing'}: ${filtered.length} ${lang==='vi'?'nhóm':'groups'}`;
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function setSort(col) { sortCol = col; sortAsc = !sortAsc; renderTable(); }
        function deleteEntry(id) { if(confirm("Xóa?")) db.ref('sessions/'+id).remove(); }
        
        changeLanguage();
    </script>
</body>
</html>
