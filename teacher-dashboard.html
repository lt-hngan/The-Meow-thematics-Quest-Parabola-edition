<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard - Realtime</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { color: #1a2a6c; margin: 0; }
        
        .export-btn { background-color: #28a745; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .export-btn:hover { background-color: #218838; transform: translateY(-2px); }

        .stats-bar { text-align: center; background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; color: #333; font-weight: bold; border: 2px dashed #ccc; }
        
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1a2a6c; color: white; font-size: 14px; vertical-align: top; }
        tr:hover { background-color: #f1f1f1; }
        
        .sortable { cursor: pointer; user-select: none; }
        .sortable:hover { color: #FFD700; }
        .filter-select { width: 100%; margin-top: 8px; padding: 4px; font-size: 13px; border-radius: 4px; border: none; outline: none; color: #333; }
        
        .status-playing { color: #ff8a00; font-weight: bold; }
        .status-finished { color: #28a745; font-weight: bold; }
        .status-none { color: #dc3545; font-weight: bold; }
        .progress-badge { background: #007bff; color: white; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        
        /* CSS cho nút Xóa */
        .delete-btn { background: none; border: none; cursor: pointer; font-size: 20px; transition: 0.2s; opacity: 0.7; }
        .delete-btn:hover { transform: scale(1.3); opacity: 1; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🎮 Student Progress Dashboard 🎮</h1>
        <button class="export-btn" onclick="exportTableToCSV('Student_Progress.csv')">📥 Export to Excel (CSV)</button>
    </div>
    
    <div id="stats-container" class="stats-bar">Waiting for data...</div>
    
    <table id="dashboard-table">
        <thead>
            <tr>
                <th>
                    Class
                    <select id="filter-class" class="filter-select" onchange="renderTable()">
                        <option value="">All Classes</option>
                        <option value="10A">10A</option>
                        <option value="10B">10B</option>
                    </select>
                </th>
                <th class="sortable" onclick="setSort('name')">Group Members ↕</th>
                <th class="sortable" onclick="setSort('status')">
                    Status ↕
                    <select id="filter-status" class="filter-select" onchange="renderTable()">
                        <option value="">All Status</option>
                        <option value="playing">Playing</option>
                        <option value="finished">Finished</option>
                        <option value="none">None</option>
                    </select>
                </th>
                <th class="sortable" onclick="setSort('progress')">Progress ↕</th>
                <th class="sortable" onclick="setSort('duration')">Duration ↕</th>
                <th>
                    Wrong Answers
                    <select id="filter-wrong" class="filter-select" onchange="renderTable()">
                        <option value="">All Questions</option>
                        <option value="Q1">Q1</option>
                        <option value="Q2">Q2</option>
                        <option value="Q3">Q3</option>
                        <option value="Q4">Q4</option>
                        <option value="Q5">Q5</option>
                        <option value="Q6">Q6</option>
                        <option value="Q7">Q7</option>
                    </select>
                </th>
                <th>
                    Review Topics
                    <select id="filter-topic" class="filter-select" onchange="renderTable()">
                        <option value="">All Topics</option>
                    </select>
                </th>
                <th style="text-align: center;">Action</th>
            </tr>
        </thead>
        <tbody id="student-list">
            <tr><td colspan="8" style="text-align: center;">Loading data from Firebase...</td></tr>
        </tbody>
    </table>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // !!! NHỚ DÁN LẠI CONFIG FIREBASE CỦA BẠN VÀO ĐÂY NHÉ !!!
        const firebaseConfig = {
  apiKey: "AIzaSyBFudz97TIDFD7dUZuVIKB-IH0vcz6bA-M",
  authDomain: "the-meow-thematics-quest.firebaseapp.com",
  databaseURL: "https://the-meow-thematics-quest-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "the-meow-thematics-quest",
  storageBucket: "the-meow-thematics-quest.firebasestorage.app",
  messagingSenderId: "640229575133",
  appId: "1:640229575133:web:28c8533120bcdbe2b78e34"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let rawData = [];
        let currentFilteredData = []; 
        let sortCol = '';
        let sortAsc = true;

        db.ref('sessions').on('value', (snapshot) => {
            const data = snapshot.val();
            rawData = [];
            let allTopics = new Set();

            if (data) {
                for (let id in data) {
                    let row = data[id];
                    row.firebaseId = id; // Lưu lại ID gốc của Firebase để gọi lệnh xóa
                    rawData.push(row);
                    if (row.reviewTopics && !row.reviewTopics.includes("Perfect Run")) {
                        row.reviewTopics.split(",").forEach(t => allTopics.add(t.trim()));
                    }
                }
            }
            
            updateTopicDropdown(Array.from(allTopics));
            renderTable();
        });

        // HÀM XÓA DỮ LIỆU
        window.deleteEntry = function(id) {
            if (confirm("Are you sure you want to delete this record? This action cannot be undone.")) {
                db.ref('sessions/' + id).remove()
                    .then(() => console.log("Record deleted successfully."))
                    .catch((error) => alert("Error deleting record: " + error));
            }
        };

        function updateTopicDropdown(topics) {
            let select = document.getElementById("filter-topic");
            let currentVal = select.value;
            select.innerHTML = '<option value="">All Topics</option>';
            topics.sort().forEach(t => {
                if(t) select.innerHTML += `<option value="${t}">${t}</option>`;
            });
            select.value = currentVal; 
        }

        function setSort(col) {
            if (sortCol === col) {
                sortAsc = !sortAsc; 
            } else {
                sortCol = col;
                sortAsc = true;
            }
            renderTable();
        }

        function parseDuration(durStr) {
            if(!durStr || durStr === "N/A") return 0;
            let m = 0, s = 0;
            let matchM = durStr.match(/(\d+)m/);
            let matchS = durStr.match(/(\d+)s/);
            if(matchM) m = parseInt(matchM[1]);
            if(matchS) s = parseInt(matchS[1]);
            return m * 60 + s;
        }

        function getStatusRank(status) {
            let s = (status || "").toLowerCase();
            if (s.includes("victory")) return 4;
            if (s.includes("game over")) return 3;
            if (s.includes("playing")) return 2;
            return 1;
        }

        function renderTable() {
            let fClass = document.getElementById("filter-class").value;
            let fStatus = document.getElementById("filter-status").value;
            let fWrong = document.getElementById("filter-wrong").value;
            let fTopic = document.getElementById("filter-topic").value;

            currentFilteredData = rawData.filter(row => {
                if (fClass && row.class !== fClass) return false;
                if (fStatus && !(row.status || "").toLowerCase().includes(fStatus)) return false;
                if (fWrong && !(row.wrongAnswers || "").includes(fWrong)) return false;
                if (fTopic && !(row.reviewTopics || "").includes(fTopic)) return false;
                return true;
            });

            if (sortCol) {
                currentFilteredData.sort((a, b) => {
                    let valA, valB;
                    if (sortCol === 'name') { valA = (a.name || "").toLowerCase(); valB = (b.name || "").toLowerCase(); }
                    else if (sortCol === 'progress') { valA = a.progress || 0; valB = b.progress || 0; }
                    else if (sortCol === 'duration') { valA = parseDuration(a.duration); valB = parseDuration(b.duration); }
                    else if (sortCol === 'status') { valA = getStatusRank(a.status); valB = getStatusRank(b.status); }
                    
                    if (valA < valB) return sortAsc ? -1 : 1;
                    if (valA > valB) return sortAsc ? 1 : -1;
                    return 0;
                });
            }

            let statsBar = document.getElementById("stats-container");
            let statsText = `Showing: ${currentFilteredData.length} groups.`;
            if (fWrong) statsText += ` | ❌ ${currentFilteredData.length} groups failed ${fWrong}.`;
            if (fTopic) statsText += ` | 📚 ${currentFilteredData.length} groups need to review [${fTopic}].`;
            statsBar.innerText = statsText;

            const tbody = document.getElementById('student-list');
            tbody.innerHTML = "";

            if (currentFilteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No matching data found</td></tr>';
                return;
            }

            currentFilteredData.forEach(student => {
                let statusClass = "status-none";
                let sLow = (student.status || "").toLowerCase();
                if (sLow === "playing") statusClass = "status-playing";
                else if (sLow.includes("finished")) statusClass = "status-finished";

                let currentProgress = student.progress !== undefined ? student.progress : 0;

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${student.class || ""}</b></td>
                    <td>${student.name || ""}</td>
                    <td class="${statusClass}">${(student.status || "").toUpperCase()}</td>
                    <td><span class="progress-badge">${currentProgress} / 7</span></td>
                    <td>${student.duration || "N/A"}</td>
                    <td>${student.wrongAnswers || "None"}</td>
                    <td><small>${student.reviewTopics || "Perfect Run"}</small></td>
                    <td style="text-align: center;">
                        <button class="delete-btn" onclick="deleteEntry('${student.firebaseId}')" title="Delete record">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportTableToCSV(filename) {
            let csv = [];
            csv.push(["Class", "Group Members", "Status", "Progress", "Duration", "Wrong Answers", "Review Topics"].join(","));
            
            currentFilteredData.forEach(row => {
                let progressStr = (row.progress || 0) + "/7";
                let cols = [
                    row.class || "",
                    row.name || "",
                    row.status || "",
                    progressStr,
                    row.duration || "N/A",
                    row.wrongAnswers || "None",
                    row.reviewTopics || "Perfect Run"
                ].map(text => '"' + String(text).replace(/"/g, '""') + '"');
                
                csv.push(cols.join(","));
            });

            downloadCSV(csv.join("\n"), filename);
        }

        function downloadCSV(csv, filename) {
            let csvFile;
            let downloadLink;
            const BOM = "\uFEFF"; 
            csvFile = new Blob([BOM + csv], {type: "text/csv;charset=utf-8;"});

            downloadLink = document.createElement("a");
            downloadLink.download = filename;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
        }
    </script>
</body>
</html>
