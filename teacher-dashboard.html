<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard - Offline Analytics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { color: #1a2a6c; margin: 0; text-transform: uppercase; text-shadow: 2px 2px 0px #ccc; }
        
        .export-btn { background-color: #28a745; color: white; border: none; padding: 12px 24px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .export-btn:hover { background-color: #218838; transform: translateY(-2px); }

        .stats-bar { text-align: center; background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; color: #333; font-weight: bold; border: 2px dashed #ccc; }
        
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1a2a6c; color: white; font-size: 14px; vertical-align: top; }
        tr:hover { background-color: #f1f1f1; }
        
        .sortable { cursor: pointer; user-select: none; }
        .sortable:hover { color: #FFD700; }
        .filter-select { width: 100%; margin-top: 8px; padding: 4px; font-size: 13px; border-radius: 4px; border: none; outline: none; color: #333; }
        
        .status-playing { color: #ff8a00; font-weight: bold; }
        .status-finished { color: #28a745; font-weight: bold; }
        .status-none { color: #dc3545; font-weight: bold; }
        .progress-badge { background: #007bff; color: white; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .delete-btn { background: none; border: none; cursor: pointer; font-size: 20px; transition: 0.2s; opacity: 0.7; }
        .delete-btn:hover { transform: scale(1.3); opacity: 1; }

        .ai-panel { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 6px solid #6f42c1; margin-bottom: 20px; }
        .ai-btn { background: #6f42c1; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-right: 10px; margin-bottom: 10px; }
        .ai-btn:hover { background: #5a32a3; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9000; }
        .modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 6px solid #6f42c1;}
        .modal-close { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; }
        
        .ai-output-content { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; line-height: 1.6; font-size: 16px; margin-top: 15px; }
        .ai-output-content h3 { color: #1a2a6c; margin-top: 20px; margin-bottom: 10px; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
        .copy-prompt-btn { background-color: #ffc107; color: #333; border: none; padding: 10px 20px; font-size: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; display: block; width: 100%; text-align: center; }
        .copy-prompt-btn:hover { background-color: #e0a800; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header-container" style="justify-content: center; margin: 20px 0 30px 0;">
        <h1 id="ui-title">🎮 Student Progress Dashboard 🎮</h1>
    </div>

    <div class="ai-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 id="ui-analytics-title" style="color: #6f42c1; margin: 0;">🧠 Pedagogical Analytics (Auto-Extract)</h2>
            <select id="app-language" onchange="changeLanguage()" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; cursor: pointer;">
                <option value="en">🇬🇧 English</option>
                <option value="vi">🇻🇳 Tiếng Việt</option>
            </select>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label id="ui-select-class-label" style="font-weight: bold; margin-right: 10px;">Select Class to Analyze:</label>
            <select id="ai-target-class" style="padding: 8px; border-radius: 5px;">
                <option value="ALL">All Classes</option>
                <option value="10A">Class 10A</option>
                <option value="10B">Class 10B</option>
            </select>
        </div>

        <div>
            <button class="ai-btn" id="btn-top-mistakes" onclick="generateReport('mistakes')">1. Top 3 Mistakes</button>
            <button class="ai-btn" id="btn-top-time" onclick="generateReport('time')">2. Top 3 Time-Consuming</button>
            <button class="ai-btn" id="btn-top-attempts" onclick="generateReport('attempts')">3. Top 3 Most Attempts</button>
        </div>
    </div>

    <div id="stats-container" class="stats-bar">Waiting for data...</div>
    
    <table id="dashboard-table">
        <thead>
            <tr>
                <th><span id="ui-col-class">Class</span><select id="filter-class" class="filter-select" onchange="renderTable()"><option value="">All</option><option value="10A">10A</option><option value="10B">10B</option></select></th>
                <th class="sortable" onclick="setSort('name')"><span id="ui-col-members">Group Members</span> ↕</th>
                <th><span id="ui-col-mode">Mode</span><select id="filter-mode" class="filter-select" onchange="renderTable()"><option value="">All</option><option value="practice">Practice</option><option value="combat">Combat</option></select></th>
                <th class="sortable" onclick="setSort('status')"><span id="ui-col-status">Status</span> ↕</th>
                <th class="sortable" onclick="setSort('progress')"><span id="ui-col-progress">Progress</span> ↕</th>
                <th class="sortable" onclick="setSort('duration')"><span id="ui-col-duration">Duration</span> ↕</th>
                <th><span id="ui-col-wrong">Wrong Answers</span></th>
                <th style="text-align: center;"><span id="ui-col-action">Action</span></th>
            </tr>
        </thead>
        <tbody id="student-list">
            <tr><td colspan="8" style="text-align: center;">Loading data from Firebase...</td></tr>
        </tbody>
    </table>

    <div id="ai-result-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('ai-result-modal')">X</button>
            <h2 id="ai-result-title" style="margin-top: 0; color: #6f42c1;">Analytics Result</h2>

        // ------------------------------------------------------------------
        // 4. DATA EXTRACTION ALGORITHMS
        // ------------------------------------------------------------------
        function extractTop3(dataList, type) {
            let metricMap = {};
            
            dataList.forEach(row => {
                if(type === 'mistakes') {
                    // Xử lý chuỗi wrongAnswers (vd: "Q1, Q3, Q4")
                    if(row.wrongAnswers && row.wrongAnswers !== "None") {
                        let qs = row.wrongAnswers.split(",").map(q => q.trim().substring(0,2)); // Lấy 2 ký tự đầu "Q1"
                        qs.forEach(q => { if(q.startsWith('Q')) metricMap[q] = (metricMap[q] || 0) + 1; });
                    }
                } 
                else if (type === 'time' && row.questionTimes) {
                    for(let q in row.questionTimes) {
                        if(!metricMap[q]) metricMap[q] = { total: 0, count: 0 };
                        metricMap[q].total += row.questionTimes[q];
                        metricMap[q].count++;
                    }
                }
                else if (type === 'attempts' && row.questionAttempts) {
                    // Giả định DB có cấu trúc questionAttempts
                    for(let q in row.questionAttempts) {
                        if(!metricMap[q]) metricMap[q] = { total: 0, count: 0 };
                        metricMap[q].total += row.questionAttempts[q];
                        metricMap[q].count++;
                    }
                }
            });

            let sortedArr = [];
            if(type === 'mistakes') {
                sortedArr = Object.keys(metricMap).map(k => ({ q: k, val: metricMap[k] })).sort((a,b) => b.val - a.val);
            } else {
                sortedArr = Object.keys(metricMap).map(k => ({ q: k, val: (metricMap[k].total / metricMap[k].count).toFixed(1) })).sort((a,b) => b.val - a.val);
            }
            
            return sortedArr.slice(0, 3);
        }

        // ------------------------------------------------------------------
        // 5. REPORT GENERATION
        // ------------------------------------------------------------------
        function generateReport(type) {
            const targetClass = document.getElementById('ai-target-class').value;
            const lang = document.getElementById('app-language').value;
            
            let analysisData = rawData;
            if (targetClass !== "ALL") analysisData = rawData.filter(r => r.class === targetClass);
            
            if(analysisData.length === 0) {
                alert(lang === 'en' ? "No data available for this class." : "Không có dữ liệu cho lớp này.");
                return;
            }

            // Gọi thuật toán trích xuất top 3
            let top3Data = extractTop3(analysisData, type);
            if(top3Data.length === 0) {
                 alert(lang === 'en' ? "Insufficient metrics to analyze." : "Không đủ dữ liệu chi tiết để phân tích.");
                 return;
            }

            let htmlContent = "";
            let promptQuestionsContext = [];
            
            if(type === 'mistakes') {
                document.getElementById('ai-result-title').innerText = lang === 'en' ? "Top 3 Common Mistakes" : "Top 3 Lỗi Sai Nhiều Nhất";
                htmlContent += `<h3>${lang==='en' ? 'Knowledge Gap Analysis' : 'Phân tích Lỗ hổng Kiến thức'}</h3><ul>`;
                top3Data.forEach(item => {
                    let desc = ANALYSIS_DB[lang].mistakes[item.q] || "N/A";
                    htmlContent += `<li style="margin-bottom:10px;">[${item.val} ${lang==='en'?'fails':'lỗi'}] ${desc}</li>`;
                    promptQuestionsContext.push(item.q);
                });
                htmlContent += "</ul>";
            } 
            else if (type === 'time') {
                document.getElementById('ai-result-title').innerText = lang === 'en' ? "Top 3 Time-Consuming Tasks" : "Top 3 Câu Hỏi Tốn Thời Gian Nhất";
                htmlContent += `<h3>${lang==='en' ? 'Time Allocation Analysis' : 'Phân tích Thời gian thực hiện'}</h3><ul>`;
                top3Data.forEach(item => {
                    let desc = ANALYSIS_DB[lang].time[item.q] || "N/A";
                    htmlContent += `<li style="margin-bottom:10px;"><b>${item.q}</b> [Avg: ${item.val}s]: ${desc}</li>`;
                    promptQuestionsContext.push(item.q);
                });
                htmlContent += "</ul>";
            }
            else if (type === 'attempts') {
                document.getElementById('ai-result-title').innerText = lang === 'en' ? "Top 3 Most Attempts Tasks" : "Top 3 Câu Hỏi Thử & Sai Nhiều Nhất";
                htmlContent += `<h3>${lang==='en' ? 'Attempt (Trial & Error) Analysis' : 'Phân tích Số lần thử (Attempts)'}</h3><ul>`;
                top3Data.forEach(item => {
                    let desc = ANALYSIS_DB[lang].attempts[item.q] || "N/A";
                    htmlContent += `<li style="margin-bottom:10px;"><b>${item.q}</b> [Avg attempts: ${item.val}]: ${desc}</li>`;
                    promptQuestionsContext.push(item.q);
                });
                htmlContent += "</ul>";
            }

            document.getElementById('ai-output').innerHTML = htmlContent;
            
            // Xây dựng Prompt để sao chép
            let contextStr = promptQuestionsContext.join(", ");
            if (lang === 'en') {
                currentPromptTemplate = `Act as an expert math Instructional Designer. Based on my class data, students struggled the most with questions ${contextStr} regarding Parabola properties. Using this context, provide me a 15-minute differentiated intervention activity to fix their misconceptions. Structure your response with a clear objective, steps, and required materials.`;
            } else {
                currentPromptTemplate = `Đóng vai một chuyên gia sư phạm Toán học. Dựa trên dữ liệu lớp học, học sinh của tôi gặp khó khăn lớn nhất ở các câu hỏi ${contextStr} liên quan đến chuyên đề Parabol. Dựa vào thông tin này, hãy thiết kế cho tôi một hoạt động can thiệp phân hóa (differentiated intervention) kéo dài 15 phút để sửa lỗi sai cho các em. Hãy trình bày rõ mục tiêu, các bước thực hiện và giáo cụ cần thiết.`;
            }

            document.getElementById('ai-result-modal').style.display = 'block';
        }

        function copyAIPrompt() {
            navigator.clipboard.writeText(currentPromptTemplate).then(() => {
                const lang = document.getElementById('app-language').value;
                alert(lang === 'en' ? "Prompt copied to clipboard! Paste it into ChatGPT or Gemini." : "Đã sao chép Prompt! Hãy dán nó vào ChatGPT hoặc Gemini của bạn.");
            });
        }

        window.closeModal = function(id) { 
            document.getElementById(id).style.display = 'none'; 
        };

        // ------------------------------------------------------------------
        // 6. UTILITY FUNCTIONS (TABLE & SORTING)
        // ------------------------------------------------------------------
        window.setSort = function(col) { 
            if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; } 
            renderTable(); 
        };
        
        window.parseDuration = function(durStr) { 
            if(!durStr || durStr === "N/A") return 0; 
            let m = 0, s = 0; 
            let matchM = durStr.match(/(\d+)m/); let matchS = durStr.match(/(\d+)s/); 
            if(matchM) m = parseInt(matchM[1]); if(matchS) s = parseInt(matchS[1]); 
            return m * 60 + s; 
        };
        
        window.getStatusRank = function(status) { 
            let s = (status || "").toLowerCase(); 
            if (s.includes("victory")) return 4; 
            if (s.includes("game over")) return 3; 
            if (s.includes("playing")) return 2; return 1; 
        };

        window.deleteEntry = function(id) { 
            const lang = document.getElementById('app-language').value;
            let msg = lang === 'en' ? "Are you sure you want to delete this record?" : "Bạn có chắc chắn muốn xóa bản ghi này?";
            if (confirm(msg)) db.ref('sessions/' + id).remove(); 
        };

        window.renderTable = function() {
            let fClass = document.getElementById("filter-class").value;
            let fMode = document.getElementById("filter-mode").value;
            const lang = document.getElementById('app-language').value;

            currentFilteredData = rawData.filter(row => {
                if (fClass && row.class !== fClass) return false;
                if (fMode && row.mode !== fMode) return false;
                return true;
            });

            if (sortCol) {
                currentFilteredData.sort((a, b) => {
                    let valA, valB;
                    if (sortCol === 'name') { valA = (a.name || "").toLowerCase(); valB = (b.name || "").toLowerCase(); }
                    else if (sortCol === 'progress') { valA = a.progress || 0; valB = b.progress || 0; }
                    else if (sortCol === 'duration') { valA = parseDuration(a.duration); valB = parseDuration(b.duration); }
                    else if (sortCol === 'status') { valA = getStatusRank(a.status); valB = getStatusRank(b.status); }
                    if (valA < valB) return sortAsc ? -1 : 1; if (valA > valB) return sortAsc ? 1 : -1; return 0;
                });
            }

            let statsText = lang === 'en' ? `Showing: ${currentFilteredData.length} groups.` : `Hiển thị: ${currentFilteredData.length} nhóm.`;
            document.getElementById("stats-container").innerText = statsText;

            const tbody = document.getElementById('student-list');
            tbody.innerHTML = "";
            if (currentFilteredData.length === 0) { 
                let msg = lang === 'en' ? "No data" : "Không có dữ liệu";
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center;">${msg}</td></tr>`; return; 
            }

            currentFilteredData.forEach(student => {
                let statusClass = "status-none"; let sLow = (student.status || "").toLowerCase();
                if (sLow === "playing" || sLow === "waiting") statusClass = "status-playing"; 
                else if (sLow.includes("finished")) statusClass = "status-finished";

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${student.class || ""}</b></td>
                    <td>${student.name || ""}</td>
                    <td><b>${(student.mode || "practice").toUpperCase()}</b></td>
                    <td class="${statusClass}">${(student.status || "").toUpperCase()}</td>
                    <td><span class="progress-badge">${student.progress || 0} / 7</span></td>
                    <td>${student.duration || "N/A"}</td>
                    <td>${student.wrongAnswers || "None"}</td>
                    <td style="text-align: center;"><button class="delete-btn" onclick="deleteEntry('${student.firebaseId}')">🗑️</button></td>
                `;
                tbody.appendChild(tr);
            });
        };
        
        // Init Language
        changeLanguage();
    </script>
</body>
</html>
