<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Race - Live Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 20px; 
            background-image: 
                url('assets/img/backgrounds/VINES - Second.png'), url('assets/img/backgrounds/BUSH - BACKGROUND.png'), 
                url('assets/img/backgrounds/WOODS - Fourth.png'), url('assets/img/backgrounds/WOODS - Third.png'), 
                url('assets/img/backgrounds/WOODS - Second.png'), url('assets/img/backgrounds/WOODS - First.png'), 
                url('assets/img/backgrounds/BACKGROUND.png'); 
            background-repeat: repeat-x; 
            background-size: auto 100%, auto 100%, auto 100%, auto 100%, auto 100%, auto 100%, cover; 
            background-position: top left, bottom left, bottom left, bottom left, bottom left, bottom left, center; 
            image-rendering: pixelated; font-family: 'Roboto', sans-serif; overflow-x: hidden; min-height: 100vh; box-sizing: border-box;
        }

        h1 { text-align: center; color: #fff; font-family: 'VT323', monospace; font-size: 70px; text-shadow: 4px 4px 0 #000; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 3px; }
        
        /* ĐÃ THÊM color: #fff; VÀO ĐÂY */
        #status-indicator { color: #fff; text-align: center; font-family: 'VT323', monospace; font-size: 32px; margin-bottom: 20px; background: rgba(0,0,0,0.7); display: inline-block; padding: 5px 20px; border-radius: 10px; border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        #race-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-race { padding: 15px 40px; font-size: 28px; color: white; border-radius: 10px; cursor: pointer; font-family: 'VT323', monospace; border: 4px solid; margin: 0; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-race:hover { transform: scale(1.05); }
        .btn-start { background: #28a745; border-color: #1e7e34; }
        .btn-reset { background: #dc3545; border-color: #bd2130; font-size: 24px; padding: 15px 25px; }
        
        #waiting-count-box { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; border: 3px solid #17a2b8; color: #fff; font-family: 'VT323', monospace; font-size: 32px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        #race-container { display: flex; flex-direction: column; gap: 15px; background: rgba(0, 0, 0, 0.5); padding: 20px; border-radius: 15px; border: 4px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }

        .waiting-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 10px; }
        .waiting-player { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.6); border: 3px solid #FFD700; border-radius: 15px; width: 160px; height: 160px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .waiting-player:hover { transform: scale(1.1); border-color: #fff; }
        .waiting-car { margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        .waiting-car img { width: 70px; height: 70px; object-fit: contain; image-rendering: pixelated; }
        .waiting-name { color: #fff; font-family: 'Roboto', sans-serif; font-weight: bold; font-size: 18px; text-align: center; word-break: break-word; text-shadow: 2px 2px 0 #000; padding: 0 10px; }
        
        .track-row { display: flex; align-items: center; border-radius: 50px; padding: 5px 15px; border: 4px solid #999; position: relative; box-shadow: inset 0 5px 10px rgba(0,0,0,0.2); transition: all 0.5s ease; }
        .track-row.rank-1 { border-color: #FFD700; background: rgba(255, 215, 0, 0.2); } .track-row.rank-1 .recent-label { background: #FFD700; color: #000; } .track-row.rank-1 .road-fill { background: linear-gradient(90deg, #fff 0%, #FFD700 100%); }
        .track-row.rank-2 { border-color: #C0C0C0; background: rgba(192, 192, 192, 0.2); } .track-row.rank-2 .recent-label { background: #C0C0C0; color: #000; } .track-row.rank-2 .road-fill { background: linear-gradient(90deg, #fff 0%, #C0C0C0 100%); }
        .track-row.rank-3 { border-color: #CD7F32; background: rgba(205, 127, 50, 0.2); } .track-row.rank-3 .recent-label { background: #CD7F32; color: #fff; } .track-row.rank-3 .road-fill { background: linear-gradient(90deg, #fff 0%, #CD7F32 100%); }
        .track-row.rank-other { border-color: #007bff; background: rgba(0, 123, 255, 0.2); } .track-row.rank-other .recent-label { background: #007bff; color: #fff; } .track-row.rank-other .road-fill { background: linear-gradient(90deg, #fff 0%, #007bff 100%); }
        .track-row.rank-runnerup { border-color: #ff4500; background: rgba(255, 69, 0, 0.2); border-style: dashed; } .track-row.rank-runnerup .recent-label { background: #ff4500; color: #fff; } .track-row.rank-runnerup .road-fill { background: linear-gradient(90deg, #fff 0%, #ff4500 100%); }

        .recent-label { position: absolute; top: -12px; left: 30px; font-size: 14px; padding: 2px 10px; border-radius: 10px; font-weight: bold; text-transform: uppercase; border: 2px solid #fff; }
        .player-info { width: 150px; min-width: 150px; font-size: 20px; font-weight: bold; color: #fff; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; display: flex; flex-direction: column; text-shadow: 2px 2px 0 #000; }
        .player-class { font-size: 14px; color: #FFD700; }

        .road { flex-grow: 1; height: 60px; background: rgba(0,0,0,0.5); border-radius: 30px; position: relative; margin: 0 15px; border: 3px solid #fff; display: flex; align-items: center; overflow: hidden; }
        .road-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: linear-gradient(90deg, #fff 0%, #28a745 100%); border-radius: 30px 0 0 30px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1; }
        .finish-line { position: absolute; right: 0; top: 0; width: 50px; height: 100%; background: repeating-linear-gradient(45deg, #fff 0, #fff 10px, #000 10px, #000 20px); border-radius: 0 30px 30px 0; border-left: 4px solid #FFD700; z-index: 2; }
        
        .car { position: absolute; left: 0%; top: 50%; margin-top: -32px; width: 64px; height: 64px; z-index: 10; transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .car img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display: block; }
        
        .car.on-fire::after { content: '🔥'; position: absolute; left: -30px; top: 5px; font-size: 40px; animation: flicker 0.2s infinite alternate; text-shadow: 2px 2px 5px red; }
        @keyframes flicker { 0% { transform: scale(0.8) rotate(-10deg); opacity: 0.8; } 100% { transform: scale(1.2) rotate(10deg); opacity: 1; } }

        .overtaking { animation: flashShake 1s ease; }
        @keyframes flashShake { 0% { filter: drop-shadow(0 0 0px #FFD700); transform: scale(1); } 20% { filter: drop-shadow(0 0 15px #FFD700); transform: scale(1.15) rotate(-5deg); } 40% { transform: scale(1.15) rotate(5deg); } 60% { transform: scale(1.15) rotate(-5deg); } 80% { filter: drop-shadow(0 0 15px #FFD700); transform: scale(1.15) rotate(0deg); } 100% { filter: drop-shadow(0 0 0px transparent); transform: scale(1); } }

        #announcement { display: none; position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #FFD700; font-size: 60px; font-family: 'VT323', monospace; padding: 20px 50px; border-radius: 20px; z-index: 9999; text-align: center; border: 5px solid #FFD700; box-shadow: 0 0 50px #FFD700; text-transform: uppercase; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <h1>🏎️ Class Race 🏁</h1>
    
    <div style="text-align: center;">
        <div id="status-indicator">
            STATUS: <span id="status-text" style="color: #ffc107;">LOADING...</span>
        </div>
    </div>
    
    <div id="race-controls">
        <button class="btn-race btn-start" onclick="startRace()">🚀 START COMBAT RACE 🚀</button>
        <button class="btn-race btn-reset" onclick="resetRace()">RESET RACE</button>
        <div id="waiting-count-box">
            WAITING ROOM: <span id="waiting-count" style="color: #FFD700;">0</span>
        </div>
    </div>

    <div id="race-container">
        <h2 style="text-align: center; color: #fff;">Loading data...</h2>
    </div>

    <div id="announcement"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFudz97TIDFD7dUZuVIKB-IH0vcz6bA-M",
            authDomain: "the-meow-thematics-quest.firebaseapp.com",
            databaseURL: "https://the-meow-thematics-quest-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "the-meow-thematics-quest",
            storageBucket: "the-meow-thematics-quest.firebasestorage.app",
            messagingSenderId: "640229575133",
            appId: "1:640229575133:web:28c8533120bcdbe2b78e34"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let previousState = {}; 
        let isGameStarted = false;
        let sessionsData = null;
        
        const TOTAL_QUESTIONS = 7;
        
        let assignedCars = {};
        let nextCarIndex = 1;

        function assignCarsChronologically(studentsArray) {
            let sorted = [...studentsArray].sort((a, b) => (a.lastUpdated || 0) - (b.lastUpdated || 0));
            sorted.forEach(s => {
                if (!assignedCars[s.id]) {
                    assignedCars[s.id] = nextCarIndex;
                    nextCarIndex++;
                    if (nextCarIndex > 12) nextCarIndex = 1; 
                }
            });
        }

        db.ref('gameControl/isStarted').on('value', snap => {
            isGameStarted = snap.val() === true;
            let statusText = document.getElementById('status-text');
            if (isGameStarted) {
                statusText.innerText = "🟢 RACE IS LIVE!";
                statusText.style.color = "#28a745";
            } else {
                statusText.innerText = "🔴 WAITING ROOM OPEN";
                statusText.style.color = "#dc3545";
            }
            renderBoard();
        });

        db.ref('sessions').on('value', snap => {
            sessionsData = snap.val();
            renderBoard();
        });

        window.startRace = function() {
            db.ref('gameControl').set({ isStarted: true });
        };
        
        window.resetRace = function() {
            if (confirm("Reset will remove all players from the board and close the race. Are you sure?")) {
                db.ref('gameControl').set({ isStarted: false });
                db.ref('sessions').remove(); 
                
                assignedCars = {};
                nextCarIndex = 1;
            }
        };

        function fireConfetti() {
            var duration = 3 * 1000; var animationEnd = Date.now() + duration; var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function showAnnouncement(name) {
            let banner = document.getElementById('announcement');
            banner.innerHTML = `🏆 ${name} ĐÃ VỀ ĐÍCH! 🏆`; banner.style.display = 'block'; fireConfetti();
            setTimeout(() => { banner.style.display = 'none'; }, 5000);
        }

        function extractShortNames(fullNameString) {
            if (!fullNameString) return "Unknown";
            let names = fullNameString.split('&');
            let shortNames = names.map(name => {
                let parts = name.trim().split(' ');
                return parts[parts.length - 1]; 
            });
            return shortNames.join(' & ');
        }

        function renderBoard() {
            const container = document.getElementById('race-container');
            if (!sessionsData) {
                document.getElementById('waiting-count').innerText = "0";
                container.innerHTML = '<h2 style="text-align: center; color: #fff;">Waiting for racers...</h2>'; 
                return; 
            }

            let students = [];
            for (let id in sessionsData) {
                let row = sessionsData[id];
                if (row.status !== 'none' && !(row.status || "").includes('disconnected') && row.mode === 'combat') {
                    students.push({ id: id, ...row });
                }
            }

            assignCarsChronologically(students);

            document.getElementById('waiting-count').innerText = students.length;

            if (students.length === 0) {
                container.innerHTML = '<h2 style="text-align: center; color: #fff;">Waiting for Combat Racers...</h2>';
                return;
            }

            if (!isGameStarted) {
                let html = `<div class="waiting-grid">`;
                students.forEach(student => {
                    let carId = assignedCars[student.id];
                    let carImgSrc = `assets/img/race/car${carId}.png`;
                    let shortNameDisplay = extractShortNames(student.name);
                    
                    html += `
                        <div class="waiting-player">
                            <div class="waiting-car"><img src="${carImgSrc}" alt="Car"></div>
                            <div class="waiting-name">${shortNameDisplay}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                container.innerHTML = html;
            } 
            else {
                students.sort((a, b) => {
                    let pA = a.progress || 0; let pB = b.progress || 0;
                    if (pB !== pA) return pB - pA;
                    return (a.lastUpdated || 0) - (b.lastUpdated || 0); 
                });

                students.forEach((s, index) => s.rank = index + 1);
                let displayList = students.slice(0, 5);

                if (students.length > 5) {
                    let others = students.slice(5);
                    others.sort((a, b) => (b.lastUpdated || 0) - (a.lastUpdated || 0));
                    let recent = others[0];
                    recent.isRecentSlot = true;
                    displayList.push(recent);
                }
                
                let html = "";
                displayList.forEach(student => {
                    let prog = student.progress || 0;
                    if (prog > TOTAL_QUESTIONS) prog = TOTAL_QUESTIONS;
                    let leftPercent = (prog / TOTAL_QUESTIONS) * 95; 
                    let streakClass = (student.streak >= 3) ? "on-fire" : "";
                    
                    let carId = assignedCars[student.id];
                    let carImgSrc = `assets/img/race/car${carId}.png`;
                    
                    let overtakeClass = "";
                    let prev = previousState[student.id];
                    if (prev && student.rank < prev.rank && !student.isRecentSlot) overtakeClass = "overtaking";

                    if (prog === TOTAL_QUESTIONS && prev && prev.progress < TOTAL_QUESTIONS) showAnnouncement(student.name); 

                    let rowRankClass = ""; let labelText = "";
                    if (student.isRecentSlot) { rowRankClass = "rank-runnerup"; labelText = "Runner Up"; } 
                    else {
                        if (student.rank === 1) rowRankClass = "rank-1"; else if (student.rank === 2) rowRankClass = "rank-2"; else if (student.rank === 3) rowRankClass = "rank-3"; else rowRankClass = "rank-other"; 
                        labelText = `TOP ${student.rank}`;
                    }

                    let shortNameDisplay = extractShortNames(student.name);

                    html += `
                        <div class="track-row ${rowRankClass}">
                            <div class="recent-label">${labelText}</div>
                            <div class="player-info">
                                <span class="player-class">${student.class || ""}</span>
                                <span title="${student.name}">${shortNameDisplay}</span> 
                            </div>
                            <div class="road">
                                <div class="road-fill" style="width: ${leftPercent}%;"></div>
                                <div class="finish-line"></div>
                                <div class="car ${streakClass} ${overtakeClass}" style="left: ${leftPercent}%;">
                                    <img src="${carImgSrc}" alt="Car">
                                </div>
                            </div>
                            <div style="font-weight: bold; font-size: 30px; color: #fff; width: 50px; text-align: right; text-shadow: 2px 2px 0 #000;">
                                ${prog}/${TOTAL_QUESTIONS}
                            </div>
                        </div>
                    `;
                    previousState[student.id] = { rank: student.rank, progress: prog };
                });
                container.innerHTML = html;
            }
        }
    </script>
</body>
</html>
